# Chappie config — `key = value` overrides (dotted keys), one per line.
# Run:  cargo run --bin chappie -- --config configs/example.conf
# Override individual keys on the CLI too:  --set budget.gpu_mb=800
# Every key here maps 1:1 to a field of chappie_core::Config.

seed  = 42
ticks = 4000
propose_threshold = 0.25

# --- compute-tier budgets (the attention/placement scheduler) ---
budget.gpu_mb           = 600     # hot tier (VRAM); attended agents run here
budget.cpu_mb           = 1200    # warm tier (RAM); background agents
budget.max_participants = 6       # how many resident agents deliberate per tick

# --- priority (who gets promoted to which tier) ---
priority.w_relevance   = 1.0      # cosine(query, competency) — the main signal
priority.w_shared      = 0.10     # coupling to currently-hot agents (coalitions)
priority.w_reliability = 0.10     # learned trust
priority.hysteresis    = 0.15     # anti-thrash: bonus for staying put
priority.cpu_penalty   = 0.10     # down-weight warm (peripheral) bids

# --- hebbian "fire together, wire together" ---
hebbian.online_rate = 0.06
hebbian.sleep_rate  = 0.03
hebbian.decay       = 0.97
hebbian.max_weight  = 1.0         # keep bounded or routing collapses to one hub

# --- attention gate + hemisphere arbitration ---
attention.floor              = 0.15
hemisphere.novelty_threshold = 0.60   # surprise+curiosity above this -> Right leads
